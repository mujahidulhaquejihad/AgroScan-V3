<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — AgroVet</title>
  <link rel="icon" href="/static/AgroVet_logo-main.png" type="image/png" />
  <link rel="stylesheet" href="/static/styles.css?v=18">
  <script src="/static/config.js?v=11"></script>
  <script src="/static/i18n.js?v=11"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-body" data-title-key="login_title">
  <div class="auth-shell">
    <div class="auth-topbar">
      <a href="/" class="auth-brand">
        <span class="logo-chip logo-chip-auth">
          <img src="/static/AgroVet_logo-main.png" alt="AgroVet" class="logo-img logo-img-white logo-img-auth-lg" />
        </span>
      </a>
      <button type="button" id="langToggle" class="icon-btn auth-lang" data-i18n-title="language" title="Language">বাংলা</button>
    </div>

    <div class="auth-card">
      <h1 data-i18n="login_h1">Welcome back</h1>
      <p class="auth-sub" data-i18n="login_sub">Sign in to save diagnosis history across devices.</p>

      <div id="authError" class="auth-error hidden"></div>

      <form id="loginForm" class="auth-form" novalidate>
        <label class="field">
          <span data-i18n="field_email">Email</span>
          <input type="email" id="email" name="email" required autocomplete="email" data-i18n-ph="ph_email" placeholder="you@example.com">
        </label>
        <label class="field">
          <span data-i18n="field_password">Password</span>
          <input type="password" id="password" name="password" required autocomplete="current-password" data-i18n-ph="ph_password" placeholder="Password">
        </label>
        <button type="submit" class="btn btn-primary btn-block" data-i18n="auth_login">Log in</button>
      </form>

      <div class="auth-divider"><span data-i18n="or_divider">or</span></div>

      <div id="googleBtn" class="google-btn-wrap"></div>

      <button type="button" id="guestBtn" class="btn btn-secondary btn-block" data-i18n="guest_continue">Continue as Guest</button>
      <p class="auth-foot"><span data-i18n="no_account">No account?</span> <a href="/signup" data-i18n="create_one">Create one</a></p>
    </div>
  </div>
  <script src="/static/auth.js?v=11"></script>
  <script>
    document.getElementById("langToggle").onclick = function () { window.AgrovetI18n.toggleLang(); };
  </script>
</body>
</html>
